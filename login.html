<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Land Dispute System</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Land Dispute">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 1rem;
        }
        .login-box { 
            background: #fff; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 0.5rem; font-size: 1.8rem; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #34495e; font-size: 0.95rem; }
        input, select { 
            width: 100%; 
            padding: 0.8rem; 
            border: 2px solid #dcdde1; 
            border-radius: 8px; 
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #3498db; }
        button[type="submit"] { 
            width: 100%; 
            padding: 1rem; 
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin-top: 0.5rem;
            min-height: 50px;
            transition: transform 0.2s;
        }
        button[type="submit"]:hover { transform: translateY(-2px); }
        button[type="submit"]:active { transform: translateY(0); }
        .demo-info { 
            font-size: 0.85rem; 
            color: #7f8c8d; 
            margin-top: 1.5rem; 
            background: #ecf0f1; 
            padding: 1rem; 
            border-radius: 8px; 
            line-height: 1.6;
        }
        .demo-info b { color: #2c3e50; }
        .message { text-align: center; margin-top: 1rem; font-weight: bold; display: none; padding: 0.8rem; border-radius: 8px; }
        .error { color: #e74c3c; background: #f8d7da; }
        .success { color: #27ae60; background: #d4edda; }

        @media screen and (max-width: 480px) {
            .login-box { padding: 1.5rem; }
            h2 { font-size: 1.5rem; }
            button[type="submit"] { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🏛️ Land Dispute System</h2>
    <p class="subtitle">ARU Land Use Planning Project</p>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="role">Login As</label>
            <select id="role" required>
                <option value="village">Village Officer</option>
                <option value="ward">Ward Executive Officer</option>
            </select>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your official email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit">Sign In</button>
    </form>

    <div id="errorMsg" class="message error">Invalid password. Please try again.</div>
    <div id="successMsg" class="message success">Login Successful! Redirecting...</div>

    <div class="demo-info">
        <strong>Login Instructions:</strong><br>
        <b>Email:</b> Use any valid email address<br>
        <b>Password:</b> 1234
    </div>
</div>

<script>
    // If already logged in, skip login and go straight to dashboard
    if (localStorage.getItem('userSession')) {
        window.location.href = 'land_dispute.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const role = document.getElementById('role').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        let isValid = false;
        let userName = "";
        
        // FIX: Accept ANY email, just check the role and a simple universal password
        if (password === '1234') {
            isValid = true;
            if (role === 'village') {
                userName = "Village Officer";
            } else if (role === 'ward') {
                userName = "Ward Executive Officer";
            }
        }
        
        if (isValid) {
            // Save session to browser's localStorage
            const userData = { role: role, email: email, name: userName };
            localStorage.setItem('userSession', JSON.stringify(userData));
            
            successMsg.style.display = 'block';
            
            // Redirect to the main system page after 1 second
            setTimeout(() => {
                window.location.href = 'land_dispute.html';
            }, 1000);
        } else {
            errorMsg.style.display = 'block';
        }
    });

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('✅ Service Worker registered'))
            .catch(err => console.log('❌ Service Worker failed:', err));
    }
</script>

</body>
</html>
